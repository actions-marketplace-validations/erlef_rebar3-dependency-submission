---
inputs:
  tag:
    required: true
    type: string
  github_actor:
    required: true
    type: string
  GITHUB_TOKEN:
    required: true
    type: string

runs:
  using: composite

  steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        token: ${{ inputs.GITHUB_TOKEN }}

    - name: Set up Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ inputs.github_actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Build Docker image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      id: build-push-action
      with:
        cache-from: type=gha
        cache-to: type=gha,mode=max
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}:${{ inputs.tag }}

    - name: Run Docker image
      run: |
        docker run \
          --volume ".:${GITHUB_WORKSPACE}" \
          --env GITHUB_API_URL="${GITHUB_API_URL}" \
          --env GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
          --env GITHUB_WORKFLOW="${GITHUB_WORKFLOW}" \
          --env GITHUB_JOB="${GITHUB_JOB}" \
          --env GITHUB_REF="${GITHUB_REF}" \
          --env GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
          --env GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
          --env GITHUB_SHA="${GITHUB_SHA}" \
          --env GITHUB_TOKEN="${{ inputs.GITHUB_TOKEN }}" \
          "ghcr.io/${{ github.repository }}@${{ steps.build-push-action.outputs.digest }}" \
          "$@"
      shell: bash

    - name: Create a GitHub release
      if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
      run: |
        gh release create ${{ inputs.tag }} --generate-notes --latest
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
      shell: bash
